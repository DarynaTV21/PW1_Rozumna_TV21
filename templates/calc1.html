<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#141e30,#243b55);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    width:420px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:6px 0 14px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#243b55;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#141e30;
}

.back{
    display:block;
    text-align:center;
    margin-top:20px;
    text-decoration:none;
    color:#243b55;
}

</style>
</head>

<body>

<div class="card">

<h2>Калькулятор для розрахунку складу сухої та горючої маси палива</h2>

<form action="/calc1/result" method="post">

Hp % <input name="hp">
Cp % <input name="cp">
Sp % <input name="sp">
Np % <input name="np">
Op % <input name="op">
Wp % <input name="wp">
Ap % <input name="ap">

<button type="submit">Розрахувати</button>

</form>

<a class="back" href="/">Назад</a>

</div>

</body>
</html>
